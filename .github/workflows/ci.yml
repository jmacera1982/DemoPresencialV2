name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect / changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/ci.yml'
            client:
              - 'assets/**'
              - 'auth-portal.js'
              - 'client/**'
              - '**/*.html'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  security-gitleaks:
    name: security / gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar secretos expuestos
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-semgrep:
    name: security / semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep OWASP / Node.js / JavaScript
        run: |
          semgrep scan \
            --config p/nodejs \
            --config p/javascript \
            --config p/owasp-top-ten \
            --error \
            --exclude node_modules \
            --exclude server/node_modules \
            --exclude client/node_modules

  security-client-grep:
    name: security / client-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar patrones de credenciales en cliente
        run: node scripts/security-client-grep.js

  ci-required:
    name: ci / required
    runs-on: ubuntu-latest
    needs:
      - security-gitleaks
      - security-semgrep
      - security-client-grep
    steps:
      - name: Security gates passed
        run: echo "Todos los controles de seguridad obligatorios pasaron."

  server-build:
    name: server / build
    needs:
      - ci-required
      - changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Verificar lockfile servidor (antes de npm ci)
        run: node scripts/verify-lockfile.js

      - name: Instalar dependencias (npm ci)
        run: npm ci

      - name: Pre-deploy (lockfile + auditoría)
        run: npm run predeploy

  client-assets:
    name: client / assets
    needs:
      - ci-required
      - changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verificar SRI en scripts locales
        run: python scripts/apply-sri.py --check

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verificar lockfile cliente (antes de npm ci)
        working-directory: client
        run: node ../server/scripts/verify-lockfile.js .

      - name: Instalar dependencias cliente (npm ci)
        working-directory: client
        run: npm ci

      - name: Pre-deploy cliente (lockfile + auditoría)
        working-directory: client
        run: npm run predeploy
